services:
  db:
    image: postgres:15
    container_name: fsw-barber-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: fsw-barber
    ports:
      - "51213:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: